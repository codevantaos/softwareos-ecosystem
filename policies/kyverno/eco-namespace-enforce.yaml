# policies/kyverno/eco-namespace-enforce.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: eco-namespace-enforce
  annotations:
    policies.kyverno.io/title: "Enforce ECO Namespace Specification"
    policies.kyverno.io/category: "ECO Governance"
    policies.kyverno.io/severity: "critical"
    policies.kyverno.io/description: "Ensures all resources comply with the ECO namespace, labeling, and annotation standards."
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-mandatory-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
                - Service
                - Ingress
                - ConfigMap
                - Secret
      validate:
        message: "ECO namespace spec violation: missing mandatory labels. Refer to ECO_NAMESPACE_SPEC.md"
        pattern:
          metadata:
  labels:
    app.kubernetes.io/name: "?*"
    app.kubernetes.io/instance: "?*"
    app.kubernetes.io/version: "?*"
    app.kubernetes.io/component: "?*"
    app.kubernetes.io/part-of: "softwareos-base"
    softwareos-base/platform: "?*"
    softwareos-base/environment: "?*"
    softwareos-base/owner: "?*"

      - name: restrict-environment-values
  match:
  any:
      - resources:
  kinds:
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
      - Service
      - Ingress
  validate:
  message: "softwareos-base/environment must be one of: production|staging|development"
  deny:
  conditions:
  any:
      - key: "{{ request.object.metadata.labels.\"softwareos-base/environment\" }}"
  operator: AnyNotIn
  value:
      - production
      - staging
      - development

      - name: require-mandatory-annotations
  match:
  any:
      - resources:
  kinds:
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
      - Service
      - Ingress
  validate:
  message: "ECO namespace spec violation: missing mandatory annotations. Refer to ECO_NAMESPACE_SPEC.md"
  pattern:
          metadata:
  annotations:
    softwareos-base/uri: "?*"
    softwareos-base/urn: "?*"
    softwareos-base/governance-policy: "?*"
    softwareos-base/audit-log-level: "?*"

      - name: restrict-audit-log-level
  match:
  any:
      - resources:
  kinds:
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
  validate:
  message: "softwareos-base/audit-log-level must be full|minimal"
  deny:
  conditions:
  any:
      - key: "{{ request.object.metadata.annotations.\"softwareos-base/audit-log-level\" }}"
  operator: AnyNotIn
  value:
      - full
      - minimal

      - name: enforce-urn-format
  match:
  any:
      - resources:
  kinds:
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
      - Service
      - Ingress
  validate:
  message: "softwareos-base/urn must match: urn:softwareos-base:<type>:<platform>:<component>:<resource>:<uuidv1|sha256-...>"
  deny:
  conditions:
  any:
      - key: "{{ request.object.metadata.annotations.\"softwareos-base/urn\" }}"
  operator: NotMatches
  value: "^urn:softwareos-base:[a-z0-9-]+:[a-z0-9-]+:[a-z0-9-]+:[a-z0-9-]+:((?:[0-9a-f]{8}-[0-9a-f]{4}-1[0-9a-f]{3}-[0-9a-f]{4}-[0-9a-f]{12})|(?:sha256-[0-9a-f]{8,}))$"

      - name: enforce-uri-format
  match:
  any:
      - resources:
  kinds:
      - Deployment
      - StatefulSet
      - DaemonSet
      - Job
      - CronJob
      - Service
      - Ingress
  validate:
  message: "softwareos-base/uri must match: softwareos-base://<type>/<platform>/<component>/<resource>[?...]."
  deny:
  conditions:
  any:
      - key: "{{ request.object.metadata.annotations.\"softwareos-base/uri\" }}"
  operator: NotMatches
  value: "^softwareos-base://[a-z0-9-]+/[a-z0-9-]+/[a-z0-9-]+/.+(\\?.*)?$"
