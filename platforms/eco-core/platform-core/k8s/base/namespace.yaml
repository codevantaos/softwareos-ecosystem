apiVersion: v1
kind: Namespace
metadata:
  name: eco-core
  labels:
    app.kubernetes.io/name: platform-core
    app.kubernetes.io/part-of: softwareos-base
    app.kubernetes.io/managed-by: argocd
    platform.gl/name: gl.core.shared-kernel
    governance.io/managed: "true"
    softwareos-base/platform: platform-core
    softwareos-base/environment: production
    softwareos-base/owner: platform-engineering-team
  annotations:
    description: "Shared Kernel — Auth, Memory Hub, Event Bus, Policy & Audit, Infra Manager"
    softwareos-base/uri: "softwareos-base://k8s/platform-core/namespace/eco-core"
    softwareos-base/urn: "urn:softwareos-base:k8s:platform-core:namespace:eco-core:gl.core.shared-kernel"
    softwareos-base/governance-policy: "eco-core-governance.rego"
    softwareos-base/audit-log-level: "full"
