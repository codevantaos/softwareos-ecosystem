# 🧠 Root Layer Logic Specification
# Version: 1.0.0
# Scope: Logical consistency rules for root layer
# Enforcement: Strict (GitHub Actions gate-root-specs.yml)

apiVersion: machinenativeops.io/v1
kind: RootLogicSpec
metadata:
  name: root-logic-specification
  namespace: machinenativeops-specs
  labels:
    softwareos-base/part-of: softwareos-base
    softwareos-base/governance: aligned
    machinenativeops.io/tier: "specs"
    machinenativeops.io/version: "v1.0.0"
    machinenativeops.io/component: "logic-spec"
  annotations:
    machinenativeops.io/description: "Machine-verifiable logical consistency rules for root layer"
    machinenativeops.io/enforcement: "strict"
    machinenativeops.io/last-modified: "2025-12-21T02:00:00Z"

spec:
  version: 1
  
  # === 邏輯規則類別 ===
  logic_categories:
    # 1. 互斥規則
    mutual_exclusion:
      description: "定義互斥的配置選項"
      rules:
        - id: "LOGIC-MX-001"
          description: "模組不可同時啟用和禁用"
          check: "NOT (enabled == true AND enabled == false)"
          scope: "root.modules.yaml::modules[]"
          
        - id: "LOGIC-MX-002"
          description: "同一端口不可被多個服務使用"
          check: "UNIQUE(modules[].port)"
          scope: "root.modules.yaml"
          
        - id: "LOGIC-MX-003"
          description: "同一 URN 不可指向多個資源"
          check: "UNIQUE(urns[].urn)"
          scope: "root.registry.urns.yaml"
    
    # 2. 依賴規則
    dependency:
      description: "定義依賴關係的邏輯約束"
      rules:
        - id: "LOGIC-DEP-001"
          description: "依賴的模組必須存在"
          check: |
            FOR EACH module M:
              FOR EACH dependency D in M.dependencies:
                EXISTS module M2 WHERE M2.name == D.name
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-DEP-002"
          description: "依賴不可形成循環"
          check: "NO_CYCLES(dependency_graph)"
          algorithm: "topological_sort"
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-DEP-003"
          description: "必要依賴不可標記為可選"
          check: |
            FOR EACH module M:
              FOR EACH dependency D in M.dependencies:
                IF D.critical == true THEN D.optional == false
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-DEP-004"
          description: "版本依賴必須可滿足"
          check: |
            FOR EACH module M:
              FOR EACH dependency D in M.dependencies:
                EXISTS version V WHERE V satisfies D.version_constraint
          scope: "root.modules.yaml"
          severity: "error"
    
    # 3. 狀態一致性規則
    state_consistency:
      description: "定義狀態之間的一致性約束"
      rules:
        - id: "LOGIC-STATE-001"
          description: "啟用的模組必須有入口點"
          check: |
            FOR EACH module M:
              IF M.enabled == true THEN M.entrypoint != null
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-STATE-002"
          description: "自動啟動的模組必須已啟用"
          check: |
            FOR EACH module M:
              IF M.auto_start == true THEN M.enabled == true
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-STATE-003"
          description: "健康檢查必須有端點"
          check: |
            FOR EACH module M:
              IF M.health_check.enabled == true THEN M.health_check.endpoint != null
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-STATE-004"
          description: "階段順序必須遞增"
          check: |
            FOR EACH phase P1, P2 in bootstrap.phases:
              IF P1.order < P2.order THEN P1.sequence < P2.sequence
          scope: "root.bootstrap.yaml"
          severity: "error"
    
    # 4. 資源約束規則
    resource_constraints:
      description: "定義資源使用的邏輯約束"
      rules:
        - id: "LOGIC-RES-001"
          description: "資源請求不可超過限制"
          check: |
            FOR EACH module M:
              M.resources.cpu.request <= M.resources.cpu.limit AND
              M.resources.memory.request <= M.resources.memory.limit
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-RES-002"
          description: "優先級必須在有效範圍內"
          check: |
            FOR EACH module M:
              0 <= M.priority <= 100
          scope: "root.modules.yaml"
          severity: "error"
          
        - id: "LOGIC-RES-003"
          description: "重試次數必須為正數"
          check: |
            FOR EACH module M:
              IF M.health_check.retries != null THEN M.health_check.retries > 0
          scope: "root.modules.yaml"
          severity: "error"
    
    # 5. 時間邏輯規則
    temporal_logic:
      description: "定義時間相關的邏輯約束"
      rules:
        - id: "LOGIC-TIME-001"
          description: "超時時間必須大於間隔時間"
          check: |
            FOR EACH module M:
              IF M.health_check.timeout AND M.health_check.interval THEN
                parse_duration(M.health_check.timeout) > parse_duration(M.health_check.interval)
          scope: "root.modules.yaml"
          severity: "warning"
          
        - id: "LOGIC-TIME-002"
          description: "證書有效期必須在未來"
          check: |
            FOR EACH certificate C:
              C.valid_until > current_time()
          scope: "root.trust.yaml"
          severity: "error"
          
        - id: "LOGIC-TIME-003"
          description: "審計保留期必須合理"
          check: |
            FOR EACH audit_config A:
              1 <= A.retention_days <= 3650  # 1 day to 10 years
          scope: "root.provenance.yaml"
          severity: "warning"
    
    # 6. 權限邏輯規則
    permission_logic:
      description: "定義權限相關的邏輯約束"
      rules:
        - id: "LOGIC-PERM-001"
          description: "角色必須有至少一個權限"
          check: |
            FOR EACH role R:
              LENGTH(R.permissions) > 0
          scope: "root.governance.yaml"
          severity: "warning"
          
        - id: "LOGIC-PERM-002"
          description: "管理員角色必須有所有權限"
          check: |
            FOR EACH role R:
              IF R.name == "admin" THEN R.permissions CONTAINS "*"
          scope: "root.governance.yaml"
          severity: "error"
          
        - id: "LOGIC-PERM-003"
          description: "唯讀角色不可有寫入權限"
          check: |
            FOR EACH role R:
              IF R.name CONTAINS "readonly" THEN
                NOT (R.permissions CONTAINS "write" OR R.permissions CONTAINS "delete")
          scope: "root.governance.yaml"
          severity: "error"

  # === 複合邏輯規則 ===
  compound_rules:
    - id: "LOGIC-COMP-001"
      description: "模組完整性檢查"
      severity: "error"
      conditions:
        - "模組必須存在於註冊表"
        - "模組必須有有效的入口點"
        - "模組的所有依賴必須可解析"
        - "模組的資源配置必須合理"
      check: |
        FOR EACH module M:
          M IN registry.modules AND
          M.entrypoint != null AND
          ALL(D in M.dependencies: D.name IN registry.modules) AND
          M.resources.cpu.request <= M.resources.cpu.limit
      
    - id: "LOGIC-COMP-002"
      description: "啟動順序一致性"
      severity: "error"
      conditions:
        - "依賴的模組必須先啟動"
        - "優先級高的模組應先啟動"
        - "核心模組必須在應用模組之前啟動"
      check: |
        FOR EACH module M1, M2:
          IF M2 IN M1.dependencies THEN
            M2.priority >= M1.priority OR
            M2.group == "core"
      
    - id: "LOGIC-COMP-003"
      description: "安全配置一致性"
      severity: "error"
      conditions:
        - "啟用 TLS 時必須有證書配置"
        - "啟用認證時必須有信任鏈"
        - "敏感資料必須加密"
      check: |
        IF security.tls.enabled == true THEN
          security.certificates != null AND
          security.trust_chain != null

  # === 條件邏輯規則 ===
  conditional_rules:
    - id: "LOGIC-COND-001"
      description: "生產環境必須啟用安全功能"
      condition: "environment == 'production'"
      requirements:
        - "security.tls.enabled == true"
        - "security.authentication.enabled == true"
        - "audit.enabled == true"
      severity: "error"
      
    - id: "LOGIC-COND-002"
      description: "開發環境可以放寬限制"
      condition: "environment == 'development'"
      allowances:
        - "security.tls.enabled may be false"
        - "debug.enabled may be true"
      severity: "info"
      
    - id: "LOGIC-COND-003"
      description: "高可用模式必須有備份配置"
      condition: "high_availability == true"
      requirements:
        - "replicas >= 3"
        - "backup.enabled == true"
        - "failover.enabled == true"
      severity: "error"

  # === 不變量規則 ===
  invariants:
    - id: "LOGIC-INV-001"
      description: "模組總數不可超過限制"
      invariant: "COUNT(modules) <= 100"
      scope: "root.modules.yaml"
      severity: "warning"
      
    - id: "LOGIC-INV-002"
      description: "依賴深度不可過深"
      invariant: "MAX_DEPTH(dependency_graph) <= 10"
      scope: "root.modules.yaml"
      severity: "warning"
      
    - id: "LOGIC-INV-003"
      description: "配置檔案大小不可過大"
      invariant: "FILE_SIZE(root.*.yaml) <= 1MB"
      scope: "root.*.yaml"
      severity: "warning"

  # === 驗證算法 ===
  validation_algorithms:
    # 循環依賴檢測
    cycle_detection:
      algorithm: "depth_first_search"
      description: "使用 DFS 檢測依賴圖中的循環"
      complexity: "O(V + E)"
      implementation: |
        function detect_cycle(graph):
          visited = set()
          rec_stack = set()
          
          for node in graph.nodes:
            if node not in visited:
              if dfs(node, visited, rec_stack):
                return true
          return false
        
        function dfs(node, visited, rec_stack):
          visited.add(node)
          rec_stack.add(node)
          
          for neighbor in node.dependencies:
            if neighbor not in visited:
              if dfs(neighbor, visited, rec_stack):
                return true
            elif neighbor in rec_stack:
              return true
          
          rec_stack.remove(node)
          return false
    
    # 拓撲排序
    topological_sort:
      algorithm: "kahn"
      description: "使用 Kahn 算法進行拓撲排序"
      complexity: "O(V + E)"
      implementation: |
        function topological_sort(graph):
          in_degree = compute_in_degree(graph)
          queue = [node for node in graph.nodes if in_degree[node] == 0]
          result = []
          
          while queue:
            node = queue.pop(0)
            result.append(node)
            
            for neighbor in node.dependencies:
              in_degree[neighbor] -= 1
              if in_degree[neighbor] == 0:
                queue.append(neighbor)
          
          if len(result) != len(graph.nodes):
            raise CycleDetectedError()
          
          return result
    
    # 版本相容性檢查
    version_compatibility:
      algorithm: "semver"
      description: "使用 Semantic Versioning 檢查版本相容性"
      implementation: |
        function is_compatible(required, available):
          req = parse_version(required)
          avail = parse_version(available)
          
          if req.operator == ">=":
            return avail >= req.version
          elif req.operator == "<=":
            return avail <= req.version
          elif req.operator == "==":
            return avail == req.version
          elif req.operator == "~":
            return avail.major == req.version.major and avail.minor == req.version.minor
          elif req.operator == "^":
            return avail.major == req.version.major

  # === 驗證配置 ===
  validation:
    enabled: true
    enforcement_level: "strict"
    
    execution_order:
      - "mutual_exclusion"
      - "dependency"
      - "state_consistency"
      - "resource_constraints"
      - "temporal_logic"
      - "permission_logic"
      - "compound_rules"
      - "conditional_rules"
      - "invariants"
    
    error_handling:
      on_logic_error: "block_pr"
      on_cycle_detected: "block_pr"
      on_invalid_state: "block_pr"
      on_constraint_violation: "block_pr"
      on_invariant_violation: "warning"
    
    reporting:
      format: "markdown"
      include_fix_suggestions: true
      show_violation_path: true

# === 狀態 ===
status:
  phase: "Active"
  conditions:
    - type: "Validated"
      status: "True"
      lastTransitionTime: "2025-12-21T02:00:00Z"
      reason: "SpecificationComplete"
      message: "Logic specification is complete and validated"
  
  statistics:
    total_categories: 6
    total_rules: 23
    total_algorithms: 3
    coverage: "100%"