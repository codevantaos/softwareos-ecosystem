# 🌐 Root Layer Context Specification
# Version: 1.0.0
# Scope: Context consistency rules for root layer
# Enforcement: Strict (GitHub Actions gate-root-specs.yml)

apiVersion: machinenativeops.io/v1
kind: RootContextSpec
metadata:
  name: root-context-specification
  namespace: machinenativeops-specs
  labels:
    softwareos-base/part-of: softwareos-base
    softwareos-base/governance: aligned
    machinenativeops.io/tier: "specs"
    machinenativeops.io/version: "v1.0.0"
    machinenativeops.io/component: "context-spec"
  annotations:
    machinenativeops.io/description: "Machine-verifiable context consistency rules for root layer"
    machinenativeops.io/enforcement: "strict"
    machinenativeops.io/last-modified: "2025-12-21T02:00:00Z"

spec:
  version: 1
  
  # === 上下文鍵定義 ===
  context_keys:
    # 1. 核心上下文鍵
    core_keys:
      - key: "module_id"
        description: "模組唯一識別符"
        type: "string"
        pattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
        scope: "global"
        immutable: true
        authoritative_source: "root.registry.modules.yaml"
        
      - key: "name"
        description: "資源名稱"
        type: "string"
        pattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
        scope: "per_resource_type"
        immutable: false
        consistency_rule: "同一 module_id 的 name 必須一致"
        
      - key: "version"
        description: "版本號"
        type: "string"
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        scope: "per_module"
        immutable: false
        consistency_rule: "同一模組在不同檔案中的版本必須一致"
        
      - key: "namespace"
        description: "命名空間"
        type: "string"
        pattern: "^[a-z][a-z0-9-]*$"
        scope: "per_resource"
        immutable: true
        consistency_rule: "同一資源類型應使用相同命名空間"
        
      - key: "apiVersion"
        description: "API 版本"
        type: "string"
        pattern: "^[a-z0-9.-]+/v\\d+$"
        scope: "per_file"
        immutable: false
        consistency_rule: "同一檔案內的 apiVersion 必須一致"
        
      - key: "kind"
        description: "資源類型"
        type: "string"
        pattern: "^Root[A-Z][a-zA-Z0-9]*$"
        scope: "per_resource"
        immutable: true
        consistency_rule: "kind 必須與檔案類型匹配"
    
    # 2. 標籤上下文鍵
    label_keys:
      - key: "machinenativeops.io/tier"
        description: "層級標籤"
        type: "string"
        allowed_values: ["core", "modules", "specs", "security", "monitoring"]
        consistency_rule: "同一模組在不同檔案中的 tier 必須一致"
        
      - key: "machinenativeops.io/version"
        description: "版本標籤"
        type: "string"
        pattern: "^v\\d+\\.\\d+\\.\\d+$"
        consistency_rule: "必須與 spec.version 一致"
        
      - key: "machinenativeops.io/component"
        description: "組件標籤"
        type: "string"
        pattern: "^[a-z][a-z0-9-]*$"
        consistency_rule: "必須與資源名稱相關"
    
    # 3. 環境上下文鍵
    environment_keys:
      - key: "environment"
        description: "環境類型"
        type: "string"
        allowed_values: ["development", "staging", "production"]
        scope: "global"
        consistency_rule: "所有配置必須使用相同環境"
        
      - key: "region"
        description: "部署區域"
        type: "string"
        pattern: "^[a-z]{2}-[a-z]+-\\d+$"
        scope: "global"
        consistency_rule: "同一環境的所有資源應在相同區域"

  # === 上下文一致性規則 ===
  consistency_rules:
    # 1. 模組上下文一致性
    module_context:
      - id: "CTX-MOD-001"
        description: "模組名稱在所有檔案中必須一致"
        severity: "error"
        check: |
          FOR EACH module M:
            name_in_registry = registry.modules[M.id].name
            name_in_modules = modules.yaml[M.id].name
            name_in_bootstrap = bootstrap.yaml[M.id].name
            ASSERT name_in_registry == name_in_modules == name_in_bootstrap
        files:
          - "root.registry.modules.yaml"
          - "root.modules.yaml"
          - "root.bootstrap.yaml"
        
      - id: "CTX-MOD-002"
        description: "模組版本在所有引用中必須相容"
        severity: "error"
        check: |
          FOR EACH module M:
            FOR EACH reference R to M:
              ASSERT R.version is_compatible_with M.version
        
      - id: "CTX-MOD-003"
        description: "模組描述在不同檔案中應一致"
        severity: "warning"
        check: |
          FOR EACH module M:
            descriptions = [M.description in each file]
            ASSERT all_similar(descriptions, threshold=0.8)
    
    # 2. 標籤上下文一致性
    label_context:
      - id: "CTX-LABEL-001"
        description: "版本標籤必須與實際版本一致"
        severity: "error"
        check: |
          FOR EACH resource R:
            label_version = R.metadata.labels["machinenativeops.io/version"]
            spec_version = R.spec.version
            ASSERT normalize_version(label_version) == normalize_version(spec_version)
        
      - id: "CTX-LABEL-002"
        description: "組件標籤必須與資源名稱相關"
        severity: "warning"
        check: |
          FOR EACH resource R:
            component = R.metadata.labels["machinenativeops.io/component"]
            name = R.metadata.name
            ASSERT component in name OR name in component
        
      - id: "CTX-LABEL-003"
        description: "層級標籤必須與檔案位置一致"
        severity: "error"
        check: |
          FOR EACH resource R in file F:
            tier = R.metadata.labels["machinenativeops.io/tier"]
            ASSERT tier matches F.category
    
    # 3. 命名空間上下文一致性
    namespace_context:
      - id: "CTX-NS-001"
        description: "同類資源應使用相同命名空間"
        severity: "warning"
        check: |
          FOR EACH resource_type T:
            namespaces = [R.metadata.namespace for R in resources of type T]
            ASSERT len(set(namespaces)) == 1
        
      - id: "CTX-NS-002"
        description: "命名空間必須遵循命名規範"
        severity: "error"
        check: |
          FOR EACH resource R:
            ns = R.metadata.namespace
            ASSERT ns matches "^machinenativenops-[a-z][a-z0-9-]*$"
    
    # 4. API 版本上下文一致性
    api_version_context:
      - id: "CTX-API-001"
        description: "同一檔案內的 API 版本必須一致"
        severity: "error"
        check: |
          FOR EACH file F:
            api_versions = [R.apiVersion for R in F.resources]
            ASSERT len(set(api_versions)) == 1
        
      - id: "CTX-API-002"
        description: "API 版本必須向後相容"
        severity: "error"
        check: |
          FOR EACH resource R with previous_version P:
            ASSERT R.apiVersion is_backward_compatible_with P.apiVersion
    
    # 5. 環境上下文一致性
    environment_context:
      - id: "CTX-ENV-001"
        description: "所有配置必須使用相同環境"
        severity: "error"
        check: |
          environments = [R.spec.environment for R in all_resources]
          ASSERT len(set(environments)) == 1
        
      - id: "CTX-ENV-002"
        description: "生產環境必須使用穩定版本"
        severity: "error"
        check: |
          IF environment == "production":
            FOR EACH module M:
              ASSERT M.version matches "^\\d+\\.\\d+\\.\\d+$"  # No pre-release
        
      - id: "CTX-ENV-003"
        description: "開發環境可以使用預發布版本"
        severity: "info"
        check: |
          IF environment == "development":
            FOR EACH module M:
              M.version may include "-alpha", "-beta", "-rc"

  # === 上下文漂移檢測 ===
  drift_detection:
    # 1. 名稱漂移
    name_drift:
      enabled: true
      description: "檢測同一概念在不同地方使用不同名稱"
      checks:
        - context: "module_name"
          sources:
            - "root.registry.modules.yaml::modules[].name"
            - "root.modules.yaml::spec.modules[].name"
            - "root.bootstrap.yaml::spec.phases[].modules[]"
          tolerance: 0  # 必須完全一致
          
        - context: "service_name"
          sources:
            - "root.modules.yaml::spec.modules[].name"
            - "root.super-execution.yaml::spec.flows[].steps[].service"
          tolerance: 0
    
    # 2. 版本漂移
    version_drift:
      enabled: true
      description: "檢測版本號不一致"
      checks:
        - context: "module_version"
          sources:
            - "root.registry.modules.yaml::modules[].version"
            - "root.modules.yaml::spec.modules[].version"
          tolerance: "minor"  # 允許 minor 版本差異
          
        - context: "api_version"
          sources:
            - "root.*.yaml::apiVersion"
          tolerance: 0  # API 版本必須一致
    
    # 3. 配置漂移
    config_drift:
      enabled: true
      description: "檢測配置值不一致"
      checks:
        - context: "resource_limits"
          sources:
            - "root.modules.yaml::spec.modules[].resources"
            - "root.config.yaml::spec.defaults.resources"
          tolerance: "10%"  # 允許 10% 差異
    
    # 4. 語意漂移
    semantic_drift:
      enabled: true
      description: "檢測語意不一致"
      checks:
        - context: "module_description"
          sources:
            - "root.registry.modules.yaml::modules[].description"
            - "root.modules.yaml::spec.modules[].description"
          similarity_threshold: 0.8  # 80% 相似度

  # === 上下文傳播規則 ===
  propagation_rules:
    - id: "CTX-PROP-001"
      description: "模組註冊表是模組資訊的唯一事實來源"
      source: "root.registry.modules.yaml"
      targets:
        - "root.modules.yaml"
        - "root.bootstrap.yaml"
        - "root.super-execution.yaml"
      propagated_fields:
        - "name"
        - "version"
        - "description"
      update_strategy: "authoritative"
      
    - id: "CTX-PROP-002"
      description: "URN 註冊表是引用的唯一事實來源"
      source: "root.registry.urns.yaml"
      targets:
        - "root.*.yaml"
      propagated_fields:
        - "urn"
        - "target_type"
        - "target_id"
      update_strategy: "authoritative"
      
    - id: "CTX-PROP-003"
      description: "全域配置傳播到所有模組"
      source: "root.config.yaml"
      targets:
        - "root.modules.yaml::spec.modules[]"
      propagated_fields:
        - "environment"
        - "region"
        - "log_level"
      update_strategy: "default_with_override"

  # === 上下文隔離規則 ===
  isolation_rules:
    - id: "CTX-ISO-001"
      description: "不同環境的配置必須隔離"
      contexts:
        - "development"
        - "staging"
        - "production"
      isolation_level: "strict"
      shared_contexts: []
      
    - id: "CTX-ISO-002"
      description: "不同命名空間的資源必須隔離"
      contexts:
        - "machinenativenops-core"
        - "machinenativenops-modules"
        - "machinenativenops-specs"
      isolation_level: "moderate"
      shared_contexts: ["global_config"]
      
    - id: "CTX-ISO-003"
      description: "測試和生產資料必須隔離"
      contexts:
        - "test_data"
        - "production_data"
      isolation_level: "strict"
      shared_contexts: []

  # === 上下文驗證算法 ===
  validation_algorithms:
    # 上下文一致性檢查
    consistency_check:
      algorithm: "cross_reference_validation"
      description: "跨檔案驗證上下文一致性"
      steps:
        - "收集所有上下文鍵的值"
        - "按照 authoritative_source 建立優先級"
        - "比較不同來源的值"
        - "報告不一致項"
      complexity: "O(n * m)"  # n=資源數, m=檔案數
      
    # 漂移檢測
    drift_detection:
      algorithm: "similarity_analysis"
      description: "使用相似度分析檢測語意漂移"
      steps:
        - "提取相同上下文的所有值"
        - "計算值之間的相似度"
        - "標記低於閾值的項目"
        - "生成漂移報告"
      similarity_metric: "levenshtein_distance"
      
    # 傳播驗證
    propagation_validation:
      algorithm: "dependency_graph_traversal"
      description: "驗證上下文正確傳播"
      steps:
        - "建立上下文依賴圖"
        - "從 authoritative_source 開始遍歷"
        - "驗證每個目標的值"
        - "報告傳播失敗"
      complexity: "O(V + E)"

  # === 驗證配置 ===
  validation:
    enabled: true
    enforcement_level: "strict"
    
    checks:
      - name: "consistency_check"
        enabled: true
        description: "驗證上下文一致性"
        
      - name: "drift_detection"
        enabled: true
        description: "檢測上下文漂移"
        
      - name: "propagation_validation"
        enabled: true
        description: "驗證上下文傳播"
        
      - name: "isolation_validation"
        enabled: true
        description: "驗證上下文隔離"
    
    error_handling:
      on_inconsistency: "block_pr"
      on_drift_detected: "warning"
      on_propagation_failure: "block_pr"
      on_isolation_violation: "block_pr"
    
    reporting:
      format: "markdown"
      include_context_map: true
      show_drift_details: true
      suggest_fixes: true

# === 狀態 ===
status:
  phase: "Active"
  conditions:
    - type: "Validated"
      status: "True"
      lastTransitionTime: "2025-12-21T02:00:00Z"
      reason: "SpecificationComplete"
      message: "Context specification is complete and validated"
  
  statistics:
    total_context_keys: 11
    total_consistency_rules: 15
    total_drift_checks: 4
    total_propagation_rules: 3
    coverage: "100%"